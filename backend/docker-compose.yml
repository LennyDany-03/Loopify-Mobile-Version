version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: loopify_backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - .:/app
    # Overriding CMD to enable hot-reload for local development
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
